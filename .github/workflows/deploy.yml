name: Deploy to GitHub Pages

on:
  push:
    branches:
      - production
    paths-ignore:
      - ".gitignore"
      - "README.md"
      - "LICENSE.md"
      - "AGENTS.md"
  workflow_dispatch:

jobs:
  # CDK Deploy (Lambda + API Gateway)
  deploy-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.13"

      - name: Install CDK dependencies
        run: |
          npm install -g aws-cdk --ignore-scripts # --ignore-scripts is safe for the CDK CLI
          cd cdk
          python -m venv .venv
          source .venv/bin/activate
          pip install --only-binary :all: -r requirements.txt # NOSONAR: versions are pinned with == in requirements.txt; --only-binary prevents setup script execution

      - name: CDK Bootstrap
        run: |
          cd cdk
          source .venv/bin/activate
          cdk bootstrap --no-previous-parameters

      - name: CDK Deploy (all stacks)
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_FORM_EMAIL }}
          ZOHO_PASSWORD: ${{ secrets.ZOHO_APP_PASSWORD }}
        run: |
          cd cdk
          source .venv/bin/activate
          cdk deploy --all --require-approval never \
            --no-fail-on-empty-changeset \
            --parameters faredgelabs-lambda:SenderEmail="$CONTACT_EMAIL" \
            --parameters faredgelabs-lambda:ReceiverEmail="$CONTACT_EMAIL" \
            --parameters faredgelabs-lambda:ZohoAppPassword="$ZOHO_PASSWORD"

      - name: Get API GW outputs
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name faredgelabs-apigw --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" --output text)
          USER_POOL_ID=$(aws cloudformation describe-stacks --stack-name faredgelabs-apigw --query "Stacks[0].Outputs[?OutputKey=='UserPoolId'].OutputValue" --output text)
          USER_POOL_CLIENT_ID=$(aws cloudformation describe-stacks --stack-name faredgelabs-apigw --query "Stacks[0].Outputs[?OutputKey=='UserPoolClientId'].OutputValue" --output text)
          echo "API_URL=${API_URL}" > apigw-outputs.env
          echo "USER_POOL_ID=${USER_POOL_ID}" >> apigw-outputs.env
          echo "USER_POOL_CLIENT_ID=${USER_POOL_CLIENT_ID}" >> apigw-outputs.env

      - name: Upload API GW outputs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: apigw-outputs
          path: apigw-outputs.env
          retention-days: 1

  # Frontend Deploy
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: deploy-infrastructure
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      - name: Download environment file
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: apigw-outputs

      - name: Load environment variables
        run: cat apigw-outputs.env >> $GITHUB_ENV

      - name: Install dependencies
        run: npm ci # --ignore-scripts is intentionally omitted: postinstall scripts are required by esbuild (used internally by Vite)

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ env.API_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ env.USER_POOL_ID }}
          VITE_COGNITO_USER_POOL_CLIENT_ID: ${{ env.USER_POOL_CLIENT_ID }}
          VITE_AWS_REGION: ${{ secrets.AWS_REGION }}
          VITE_ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@1ef5a1b1df4c63fe21a2242edbee6cac921ece01 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
